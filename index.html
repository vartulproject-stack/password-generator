<!DOCTYPE html>
<html>
<head>
  <title>Password Generator | Day 6 by Vartul</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #1e293b;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 20px #3b82f6;
    }
    h2 { color: #3b82f6; margin-bottom: 20px; }
    input {
      width: 100%;
      padding: 10px;
      font-size: 18px;
      text-align: center;
      border: none;
      border-radius: 8px;
      margin-bottom: 15px;
      background: #334155;
      color: #22c55e;
    }
    button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 16px;
      margin: 5px;
      cursor: pointer;
    }
    button:hover { background: #2563eb; }
    .copy { background: #22c55e; }
    .copy:hover { background: #16a34a; }
    p { font-size: 12px; color: #94a3b8; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>🔐 Password Generator</h2>
    <input type="text" id="pass" readonly placeholder="Click Generate">
    <br>
    <button onclick="genPass()">Generate</button>
    <button class="copy" onclick="copyPass()">Copy</button>
    <p>Day 6/100 Project by Vartul | Deoghar</p>
  </div>

  <script>
    function genPass() {
      let chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
      let password = "";
      for (let i = 0; i < 12; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
      }
      document.getElementById("pass").value = password;
    }
    
    function copyPass() {
      let pass = document.getElementById("pass");
      if(pass.value === "") {
        alert("Pehle Generate dabao bhai 😭");
        return;
      }
      pass.select();
      document.execCommand("copy");
      alert("Password Copy Ho Gaya 👑");
    }
  </script>
</body>
</html>
